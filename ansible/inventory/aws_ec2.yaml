plugin: amazon.aws.aws_ec2

regions:
  - us-east-1

ansible_connection: "community.aws.aws_ssm"

compose:
  ansible_user: ssm-user
  ansible_python_interpreter: /usr/bin/python3

# Filter instances to only include those with the 'type' tag,
# which is applied in your main.tf configuration.
filters:
  tag:type:
    - controller
    - worker
    - bgp

# Create Ansible groups based on the value of the 'type' tag.
# e.g., an instance with 'tag:type:controller' will be in the 'controller' group.
keyed_groups:
  - key: tags.type
    prefix: ""
    separator: ""

# Create composite groups similar to your old static inventory.
groups:
  container_runners: "'controller' in (groups | default([])) or 'worker' in (groups | default([]))"
  controllers: "'controller' in (groups | default([]))"
  leader: "'controller' in (groups | default([]))"
  workers: "'worker' in (groups | default([]))"
  bgp_routers: "'bgp' in (groups | default([]))"
