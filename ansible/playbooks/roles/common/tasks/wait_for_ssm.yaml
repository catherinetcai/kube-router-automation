---
- name: Wait for instance to be reachable via SSM
  ansible.builtin.shell: >
    aws ssm describe-instance-information
    --filters "Key=InstanceIds,Values={{ inventory_hostname }}"
    --query "InstanceInformationList[0].PingStatus"
    --output text
  register: ssm_status
  until: ssm_status.stdout == "Online"
  retries: 30
  delay: 10
  changed_when: false
  connection: local
